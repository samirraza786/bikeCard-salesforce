<template>
    <lightning-card title="Add New Case">
        <div class="slds-m-around_medium">
            <lightning-input
                label="Case Subject"
                value={draftSubject}
                onchange={handleSubjectChange}>
            </lightning-input>
            <br/>
            <lightning-button
                label="Save Case"
                variant="brand"
                onclick={handleSave}>
            </lightning-button>
        </div>
    </lightning-card>
    <div class="slds-m-top_medium">
        <c-child-list items={cases}></c-child-list>
    </div>
</template>
