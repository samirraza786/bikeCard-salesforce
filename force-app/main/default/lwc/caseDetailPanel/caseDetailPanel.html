<template>
    <lightning-card title="Case Detail" icon-name="standard:case">

        <template lwc:if={noSelection}>
            <div class="slds-p-around_medium slds-text-color_weak">
                Select a case to see details.
            </div>
        </template>

        <template lwc:elseif={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <template lwc:elseif={hasError}>
            <div class="slds-p-around_medium slds-text-color_error">
                {errorMessage}
            </div>
        </template>

        <template lwc:elseif={hasData}>
            <div class="slds-p-around_medium">
                <table class="slds-table slds-table_cell-buffer">
                    <tr>
                        <th>Subject</th>
                        <td>{subject}</td>
                    </tr>
                    <tr>
                        <th>Status</th>
                        <td>{status}</td>
                    </tr>
                    <tr>
                        <th>Case Number</th>
                        <td>{caseNumber}</td>
                    </tr>
                    <tr>
                        <th>Created Date</th>
                        <td><lightning-formatted-date-time value={createdDate}></lightning-formatted-date-time></td>
                    </tr>
                </table>
            </div>
        </template>

    </lightning-card>
</template>
